const FADE_BG='#eef0f3', FADE_BD='#e0e4ea', FADE_FONT='#aeb6c2', FADE_EDGE='#eef0f3', EDGE='#cdd5e1';
const base = {}; // id -> {color:{background,border}, font:{color}}
const nodes = [], edges = [];

// article nodes
for (const slug in ART){
  const a = ART[slug], tp = TOPICS[a.t];
  base[slug] = {color:{background:tp.bg, border:tp.bd}, font:{color:'#ffffff'}};
  nodes.push({id:slug, label:a.n, title:a.n+' — '+a.s, shape:'box', topic:a.t, kind:'article',
    url:'notes/'+tp.folder+'/'+slug+'.html',
    color:{background:tp.bg,border:tp.bd}, font:{color:'#ffffff',size:13,face:'inherit'},
    margin:8, widthConstraint:{maximum:148}, borderWidth:1, shapeProperties:{borderRadius:7}});
}
// idea nodes
for (const idea of IDEAS){
  base[idea.id] = {color:{background:'#f3d27a', border:'#c79a2a'}, font:{color:'#1f1b15'}};
  nodes.push({id:idea.id, label:idea.l, title:'Idea · links '+idea.a.length+' notes', shape:'dot',
    kind:'idea', value:idea.a.length,
    color:{background:'#f3d27a',border:'#c79a2a'}, font:{color:'#1f1b15',size:14,face:'inherit'},
    widthConstraint:{maximum:135}, borderWidth:2});
  for (const num of idea.a){
    edges.push({from:idea.id, to:IDX[num], color:{color:EDGE, opacity:.7}, width:1});
  }
}

const nodesDS = new vis.DataSet(nodes);
const edgesDS = new vis.DataSet(edges);
const network = new vis.Network(document.getElementById('net'), {nodes:nodesDS, edges:edgesDS}, {
  nodes:{scaling:{min:14,max:40,label:{enabled:true,min:12,max:20}}, font:{multi:false}},
  edges:{smooth:{type:'continuous'}, selectionWidth:0},
  physics:{barnesHut:{gravitationalConstant:-9000, springLength:130, springConstant:0.035, damping:0.45, avoidOverlap:0.25}, stabilization:{iterations:300}, minVelocity:0.6},
  interaction:{hover:true, tooltipDelay:120, hideEdgesOnDrag:true},
});

// ---- focus / dim ----
function applyFocus(keep){
  const nUp=[], eUp=[];
  nodesDS.forEach(n=>{
    if(keep.has(n.id)) nUp.push({id:n.id, color:base[n.id].color, font:{color:base[n.id].font.color}});
    else nUp.push({id:n.id, color:{background:FADE_BG,border:FADE_BD}, font:{color:FADE_FONT}});
  });
  edgesDS.forEach(e=>{
    const on = keep.has(e.from) && keep.has(e.to);
    eUp.push({id:e.id, color:{color:on?EDGE:FADE_EDGE, opacity:on?.9:.25}});
  });
  nodesDS.update(nUp); edgesDS.update(eUp);
}
function resetFocus(){
  const nUp=[], eUp=[];
  nodesDS.forEach(n=>nUp.push({id:n.id, color:base[n.id].color, font:{color:base[n.id].font.color}}));
  edgesDS.forEach(e=>eUp.push({id:e.id, color:{color:EDGE, opacity:.7}}));
  nodesDS.update(nUp); edgesDS.update(eUp);
}

// ---- info panel ----
const info = document.getElementById('info');
const DEFAULT_INFO = info.innerHTML;
function showIdea(idea){
  let h = '<h3>💡 '+idea.l+'</h3><div class="meta">Notes sharing this idea:</div>';
  idea.a.forEach(num=>{ const slug=IDX[num], a=ART[slug], tp=TOPICS[a.t];
    h += '<a href="notes/'+tp.folder+'/'+slug+'.html" target="_blank">→ '+a.n+'</a>';
  });
  h += '<span class="reset" onclick="clearSel()">✕ clear</span>';
  info.innerHTML = h;
}
function clearSel(){ resetFocus(); network.unselectAll(); info.innerHTML = DEFAULT_INFO; document.getElementById('search').value=''; }
window.clearSel = clearSel;

network.on('click', params=>{
  if(params.nodes.length){
    const id = params.nodes[0];
    const idea = IDEAS.find(x=>x.id===id);
    if(idea){ // idea: highlight neighbourhood
      const keep = new Set([id, ...idea.a.map(n=>IDX[n])]);
      applyFocus(keep); showIdea(idea);
    } else { // article: open the note
      const node = nodesDS.get(id);
      if(node && node.url) window.open(node.url, '_blank');
    }
  } else { clearSel(); }
});

// ---- search ----
document.getElementById('search').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q){ resetFocus(); info.innerHTML = DEFAULT_INFO; return; }
  const keep = new Set();
  nodesDS.forEach(n=>{
    const hay = (n.label+' '+(n.title||'')).toLowerCase();
    if(hay.includes(q)) keep.add(n.id);
  });
  if(keep.size) applyFocus(keep); else resetFocus();
});

// ---- topic legend / filters ----
const legend = document.getElementById('legend');
const hidden = new Set();
for(const key in TOPICS){
  const tp = TOPICS[key];
  const chip = document.createElement('span');
  chip.className='chip'; chip.style.background=tp.bg; chip.textContent=tp.name;
  chip.onclick=()=>{
    const off = hidden.has(key);
    if(off){ hidden.delete(key); chip.classList.remove('off'); }
    else { hidden.add(key); chip.classList.add('off'); }
    const up=[];
    nodesDS.forEach(n=>{ if(n.kind==='article' && n.topic===key) up.push({id:n.id, hidden:hidden.has(key)}); });
    nodesDS.update(up);
  };
  legend.appendChild(chip);
}
network.once('stabilizationIterationsDone', ()=>{ network.fit({animation:{duration:500}}); });
</script>
